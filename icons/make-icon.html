<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 512px; height: 512px; overflow: hidden; }
body {
  background: linear-gradient(145deg, #e8eaf8, #f0f2ff);
  display: flex; align-items: center; justify-content: center;
  border-radius: 96px;
}
.icon {
  font-size: 320px;
  line-height: 1;
  filter: drop-shadow(0 8px 24px rgba(80,70,229,0.22));
  margin-bottom: 12px;
}
</style>
</head>
<body>
  <div class="icon">📻</div>
</body>
</html>
