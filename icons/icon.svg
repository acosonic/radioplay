<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eceffe"/>
      <stop offset="100%" stop-color="#dde1f8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="34" fill="url(#accent)"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="url(#accent)" stroke-width="26" stroke-linecap="round"
    stroke-dasharray="390 10" stroke-dashoffset="0"/>

  <!-- Wave left inner -->
  <path d="M210 192 Q162 222 162 256 Q162 290 210 320"
    fill="none" stroke="url(#accent)" stroke-width="26" stroke-linecap="round"/>

  <!-- Wave right inner -->
  <path d="M302 192 Q350 222 350 256 Q350 290 302 320"
    fill="none" stroke="url(#accent)" stroke-width="26" stroke-linecap="round"/>

  <!-- Wave left outer -->
  <path d="M172 152 Q100 196 100 256 Q100 316 172 360"
    fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round" opacity="0.45"/>

  <!-- Wave right outer -->
  <path d="M340 152 Q412 196 412 256 Q412 316 340 360"
    fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round" opacity="0.45"/>
</svg>
